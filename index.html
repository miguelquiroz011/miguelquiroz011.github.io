<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>NovaMap - Sistema de Información Territorial</title>

    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" crossorigin=""/>
    <link rel="stylesheet" href="https://unpkg.com/leaflet-draw/dist/leaflet.draw.css"/>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/leaflet-measure/dist/leaflet-measure.css"/>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <link rel="stylesheet" href="styles.css">
</head>
<body>

    <div id="app">
        <header id="topbar">
            <div class="brand">
                <i class="fa-solid fa-earth-americas"></i> NovaMap <span>Pro</span>
            </div>
            <div class="top-tools">
                <button title="Medición" onclick="document.querySelector('.js-toggle').click()"><i class="fa-solid fa-ruler"></i></button>
                <button title="Dibujo" onclick="togglePanel('panelDibujo')"><i class="fa-solid fa-pen-to-square"></i></button>
            </div>
        </header>

        <div id="main-container">
            <aside id="sidebar">
                <div class="sidebar-tabs">
                    <button class="tab-btn active" onclick="switchTab('capas')"><i class="fa-solid fa-layer-group"></i> Capas</button>
                    <button class="tab-btn" onclick="switchTab('estilos')"><i class="fa-solid fa-palette"></i> Estilos</button>
                </div>

                <div id="tab-capas" class="tab-content active">
                    <h3>Mapas Base</h3>
                    <div id="basemaps-container" class="layer-list"></div>
                    
                    <h3>Capas Geográficas</h3>
                    <div id="layers-container" class="layer-list"></div>
                </div>

                <div id="tab-estilos" class="tab-content">
                    <h3>Modificar Diseño</h3>
                    <p class="help-text">Selecciona una capa activa para modificar sus colores.</p>
                    <label>Capa a modificar:</label>
                    <select id="estilos-capa-selector"></select>

                    <label class="mt-2">Color de relleno:</label>
                    <input type="color" id="color-relleno" value="#39ff14">

                    <label class="mt-2">Color de borde:</label>
                    <input type="color" id="color-borde" value="#000000">

                    <label class="mt-2">Grosor de línea (<span id="grosor-val">2</span>px):</label>
                    <input type="range" id="rango-grosor" min="0" max="10" step="0.5" value="2">

                    <button id="btn-aplicar-estilo" class="btn-primary mt-2"><i class="fa-solid fa-check"></i> Aplicar Estilo</button>
                </div>
            </aside>

            <div id="map-wrapper">
                <div id="map"></div>
                
                <div id="compass" title="Orientación Norte" onclick="map.setView([6.24, -75.58], 13);"><i class="fa-regular fa-compass"></i></div>
                <div id="coordinates">Lat: 0.00000 | Lng: 0.00000</div>
            </div>
        </div>

        <div id="resizeBar"></div>

    <div id="panelInferior">
        <div id="panelBotonesFlotantes">
            <button onclick="toggleTabla()"><i class="fa-solid fa-table"></i> Tabla de Atributos</button>
            <button onclick="clearSelection()"><i class="fa-solid fa-eraser"></i> Limpiar Selección</button>
        </div>
        </div>

  <div id="tablaAtributos" class="ventana-flotante" style="display:none;">
    <div class="panel-header" id="headerTabla">
        <span><i class="fa-solid fa-table-list"></i> Tabla de Atributos <span id="tabla-titulo-capa"></span></span>
        <button onclick="toggleTabla()" class="btn-cerrar">×</button>
    </div>
    <div class="panel-body" id="tablaContenido"></div>
</div>

    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js" crossorigin=""></script>
    <script src="https://unpkg.com/leaflet-draw/dist/leaflet.draw.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/leaflet-measure/dist/leaflet-measure.js"></script>
    <script src="scripts.js"></script>
</body>
</html>
